services:
  db:
    image: postgres:18.3
    ports:
      - "5432:5432"
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${APP_DB_NAME}
      POSTGRES_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: always
    networks:
      - app-network
    environment:
      APP_DB_URL: jdbc:postgresql://db:5432/${APP_DB_NAME}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_ACCESS_TOKEN_EXPIRATION: ${APP_ACCESS_TOKEN_EXPIRATION}
      APP_REFRESH_TOKEN_EXPIRATION: ${APP_REFRESH_TOKEN_EXPIRATION}
      APP_GOOGLE_CLIENT_ID: ${APP_GOOGLE_CLIENT_ID}
      APP_GOOGLE_CLIENT_SECRET: ${APP_GOOGLE_CLIENT_SECRET}
      APP_REDIRECT_URL: ${APP_REDIRECT_URL}
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: pom.xml


volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge



