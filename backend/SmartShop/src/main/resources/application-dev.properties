spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=spycon
spring.datasource.password=myPassword
spring.jpa.open-in-view=false
spring.graphql.graphiql.enabled=true
logging.level.com.smartshop=DEBUG

# Show SQL (development only)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# OAuth2 redirect URI after successful login
oauth2.redirect-uri=http://localhost:3000/login

# Swagger UI Customization
springdoc.swagger-ui.custom-css=/swagger-custom.css
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=3
springdoc.swagger-ui.display-operation-id=false
springdoc.swagger-ui.filter=true