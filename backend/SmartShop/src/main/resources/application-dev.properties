# Load .env file as a properties source (built-in Spring Boot feature)
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${APP_DB_URL}
spring.datasource.username=${APP_DB_USER}
spring.datasource.password=${APP_DB_PASSWORD}
spring.jpa.open-in-view=false
spring.graphql.graphiql.enabled=true
logging.level.com.smartshop=DEBUG

# Show SQL (development only)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${APP_JWT_SECRET}
jwt.access-token-expiration-ms=${APP_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration-ms=${APP_REFRESH_TOKEN_EXPIRATION:604800000}

# OAuth2 Google Configuration
spring.security.oauth2.client.registration.google.client-id=${APP_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${APP_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# OAuth2 redirect URI after successful login
oauth2.redirect-uri=${APP_REDIRECT_URL}

# Swagger UI Customization
springdoc.swagger-ui.custom-css=/swagger-custom.css
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.default-models-expand-depth=3
springdoc.swagger-ui.display-operation-id=false
springdoc.swagger-ui.filter=true